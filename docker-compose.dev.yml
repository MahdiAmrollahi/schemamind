services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: schemamind:dev
    container_name: schemamind-dev
    profiles: ["dev"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - APP_DB_PATH=/app/data/app.db
      - DATABASES_DIR=/app/data/databases
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
      - schemamind-data:/app/data
      - schemamind-cache:/app/.cache/huggingface
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app

volumes:
  schemamind-data:
  schemamind-cache:
