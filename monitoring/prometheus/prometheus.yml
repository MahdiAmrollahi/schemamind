global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: schemamind

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus

  - job_name: schemamind-api
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: schemamind-api

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter
