services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: schemamind:latest
    container_name: schemamind
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - APP_DB_PATH=/app/data/app.db
      - DATABASES_DIR=/app/data/databases
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    volumes:
      - schemamind-data:/app/data
      - schemamind-cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  schemamind-data:
    driver: local
  schemamind-cache:
    driver: local

networks:
  default:
    name: schemamind-net
