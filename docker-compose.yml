services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: schemamind-api:latest
    container_name: schemamind-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - APP_DB_PATH=/app/data/app.db
      - DATABASES_DIR=/app/data/databases
      - HF_HOME=/app/.cache/huggingface
      - TRANSFORMERS_CACHE=/app/.cache/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/app/.cache/huggingface
      - PYTHONUNBUFFERED=1
    volumes:
      - schemamind-data:/app/data
      - schemamind-cache:/app/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: schemamind-frontend:latest
    container_name: schemamind-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  schemamind-data:
    driver: local
  schemamind-cache:
    driver: local

networks:
  default:
    name: schemamind-net
